<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>실시간 개표 대시보드</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f8fafc; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .candidate-card { transition: all 0.3s ease; }
        .candidate-card:hover { transform: translateY(-5px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .count-btn { transition: transform 0.1s active; }
        .count-btn:active { transform: scale(0.95); }
    </style>
</head>
<body class="h-screen overflow-hidden flex flex-col">

    <header class="bg-indigo-900 text-white py-2 px-4 flex justify-between items-center shadow-md">
        <div class="flex items-center gap-3">
            <h1 class="text-lg font-bold">🗳️ 실시간 학급 선거 개표 시스템</h1>
            <div id="live-indicator" class="flex items-center gap-1.5 px-2 py-0.5 rounded-full bg-slate-700 text-[10px] font-bold">
                <span class="w-1.5 h-1.5 rounded-full bg-slate-400"></span>
                <span>연결 확인 중...</span>
            </div>
        </div>
        <p class="text-xs opacity-80">개발자: 가치있는 미래교육연구소 대표 김병찬</p>
    </header>

    <div id="config-bar" class="bg-white border-b p-3 flex flex-wrap gap-3 items-center shadow-sm">
        <div class="flex-1 min-w-[300px]">
            <input type="text" id="ss-url" placeholder="구글 시트 URL (사본 사용 시 비워두셔도 됩니다)" 
                   class="w-full border rounded px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 outline-none border-slate-300">
        </div>
        <div class="flex items-center gap-2">
            <select id="grade" class="border rounded px-2 py-2 text-sm border-slate-300"><option value="">학년</option><script>for(let i=1;i<=6;i++) document.write(`<option value="${i}">${i}학년</option>`)</script></select>
            <select id="classNum" class="border rounded px-2 py-2 text-sm border-slate-300"><option value="">반</option><script>for(let i=1;i<=15;i++) document.write(`<option value="${i}">${i}반</option>`)</script></select>
        </div>
        <button onclick="loadCandidates()" id="load-btn" class="bg-indigo-600 text-white px-6 py-2 rounded text-sm font-semibold hover:bg-indigo-700 shadow transition">데이터 불러오기</button>
    </div>

    <main class="flex-1 flex overflow-hidden p-4 gap-4">
        <section class="w-1/3 flex flex-col bg-white rounded-xl border shadow-sm overflow-hidden">
            <div class="bg-slate-100 p-3 font-bold border-b text-slate-700 flex justify-between items-center">
                <span>📋 후보자 명단</span>
                <span id="total-count" class="text-xs font-normal text-slate-500">-</span>
            </div>
            <div class="flex-1 overflow-y-auto p-0">
                <table class="w-full text-sm text-left border-collapse">
                    <thead class="bg-slate-50 sticky top-0"><tr><th class="p-3 border-b">기호</th><th class="p-3 border-b">이름</th><th class="p-3 border-b">분야</th></tr></thead>
                    <tbody id="candidate-list">
                        <tr><td colspan="3" class="p-10 text-center text-slate-400">데이터를 불러와 주세요.</td></tr>
                    </tbody>
                </table>
            </div>
        </section>
        <section class="w-2/3 flex flex-col">
            <div class="flex justify-between items-center mb-3">
                <h2 class="text-xl font-extrabold text-slate-800">📊 실시간 개표 현황</h2>
                <div id="status-badge" class="px-3 py-1 rounded-full bg-slate-200 text-slate-600 text-xs font-bold uppercase tracking-wider">대기 중</div>
            </div>
            <div id="vote-board" class="flex-1 overflow-y-auto grid grid-cols-2 lg:grid-cols-3 gap-4 no-scrollbar pb-10"></div>
        </section>
    </main>

    <footer class="bg-white border-t p-4 flex justify-center gap-4">
        <button id="start-btn" onclick="startVoting()" disabled class="bg-green-600 text-white px-10 py-3 rounded-xl font-bold opacity-50 cursor-not-allowed shadow-lg transition">투표 시작</button>
        <button id="end-btn" onclick="endVoting()" style="display:none;" class="bg-red-600 text-white px-10 py-3 rounded-xl font-bold hover:bg-red-700 shadow-lg transition">투표 종료</button>
        <button id="submit-btn" onclick="submitResults()" style="display:none;" class="bg-blue-600 text-white px-10 py-3 rounded-xl font-bold hover:bg-blue-700 animate__animated animate__pulse animate__infinite shadow-lg">결과 전송하기</button>
    </footer>

    <div id="modal" class="fixed inset-0 bg-black bg-opacity-60 hidden items-center justify-center z-50">
        <div id="modal-content" class="bg-white p-8 rounded-2xl shadow-2xl text-center max-w-sm w-full mx-4">
            <div id="modal-spinner" class="animate-spin rounded-full h-14 w-14 border-b-4 border-indigo-600 mx-auto mb-6"></div>
            <p id="modal-text" class="font-bold text-lg text-slate-800">처리 중</p>
            <p id="modal-subtext" class="text-sm text-slate-500 mt-2">잠시만 기다려주세요.</p>
            <button id="modal-close" onclick="closeModal()" class="hidden mt-6 bg-slate-800 text-white px-6 py-2 rounded-lg font-semibold w-full">닫기</button>
        </div>
    </div>

    <script>
        /** * 테스트용 Mock 데이터를 완전히 제거했습니다.
         * 실제 구글 서버 환경이 아닐 경우 경고를 표시합니다.
         */
        const indicator = document.getElementById('live-indicator');
        
        function updateStatus() {
            if (typeof google !== 'undefined' && google.script && google.script.run) {
                indicator.innerHTML = '<span class="w-1.5 h-1.5 rounded-full bg-white"></span><span>Live: 본인 시트 연결됨</span>';
                indicator.className = "flex items-center gap-1.5 px-2 py-0.5 rounded-full bg-green-600 text-white text-[10px] font-bold";
            } else {
                indicator.innerHTML = '<span class="w-1.5 h-1.5 rounded-full bg-white animate-pulse"></span><span>Local: 미리보기 모드 (연결 안됨)</span>';
                indicator.className = "flex items-center gap-1.5 px-2 py-0.5 rounded-full bg-amber-500 text-white text-[10px] font-bold";
            }
        }
        window.onload = updateStatus;

        let candidates = [];
        let isVoting = false;

        function showModal(title, sub, spinner = true, closeBtn = false) {
            document.getElementById('modal').style.display = 'flex';
            document.getElementById('modal-text').innerText = title;
            document.getElementById('modal-subtext').innerText = sub;
            document.getElementById('modal-spinner').style.display = spinner ? 'block' : 'none';
            document.getElementById('modal-close').style.display = closeBtn ? 'block' : 'none';
        }
        function closeModal() { document.getElementById('modal').style.display = 'none'; }

        function loadCandidates() {
            if (typeof google === 'undefined' || !google.script) {
                alert("현재 '미리보기' 환경에서는 실제 데이터를 불러올 수 없습니다.\n구글 앱스 스크립트에서 [배포]를 완료하고 생성된 URL로 접속해 주세요.");
                return;
            }

            const url = document.getElementById('ss-url').value.trim();
            const g = document.getElementById('grade').value;
            const c = document.getElementById('classNum').value;

            if(!g || !c) { alert("학년과 반을 선택해 주세요."); return; }

            showModal("연결 중", "스프레드시트에서 후보자 정보를 가져오고 있습니다...");

            google.script.run
                .withSuccessHandler((data) => {
                    candidates = data.map(item => ({...item, votes: 0}));
                    renderCandidates();
                    renderBoard();
                    document.getElementById('total-count').innerText = `총 ${candidates.length}명`;
                    document.getElementById('start-btn').disabled = false;
                    document.getElementById('start-btn').classList.remove('opacity-50', 'cursor-not-allowed');
                    closeModal();
                })
                .withFailureHandler((err) => {
                    showModal("불러오기 실패", err.message, false, true);
                })
                .getCandidates(url);
        }

        function renderCandidates() {
            const list = document.getElementById('candidate-list');
            list.innerHTML = candidates.map(c => `
                <tr class="hover:bg-slate-50 border-b animate__animated animate__fadeIn">
                    <td class="p-3 font-bold text-indigo-600">기호 ${c.number}</td>
                    <td class="p-3 font-semibold">${c.name}</td>
                    <td class="p-3 text-slate-500 text-xs">${c.category}</td>
                </tr>
            `).join('');
        }

        function renderBoard() {
            const board = document.getElementById('vote-board');
            board.innerHTML = candidates.map((c, idx) => `
                <div class="candidate-card bg-white rounded-2xl border-2 p-5 flex flex-col justify-between ${isVoting ? 'border-indigo-200 shadow-lg' : 'border-slate-100'} animate__animated animate__fadeInUp">
                    <div>
                        <div class="flex justify-between items-start mb-2">
                            <span class="bg-indigo-600 text-white px-3 py-1 rounded-full text-[10px] font-bold">기호 ${c.number}</span>
                            <span class="text-slate-400 text-[10px] font-semibold">${c.category}</span>
                        </div>
                        <h3 class="text-2xl font-black text-slate-800 mb-1">${c.name} <small class="text-sm font-normal text-slate-400">(${c.gender})</small></h3>
                        <div class="bg-slate-50 p-2 rounded-lg min-h-[50px]"><p class="text-[11px] leading-tight text-slate-500 line-clamp-3">${c.promise || '공약 없음'}</p></div>
                    </div>
                    <div class="mt-4 flex items-center justify-between">
                        <div class="text-5xl font-black text-indigo-700" id="v-${idx}">${c.votes}</div>
                        ${isVoting ? `<button onclick="updateVote(${idx}, 1)" class="count-btn bg-indigo-600 text-white w-14 h-14 rounded-2xl flex items-center justify-center shadow-xl hover:bg-indigo-700 active:scale-95 transition-all text-3xl font-bold">+</button>` : ''}
                    </div>
                </div>
            `).join('');
        }

        function updateVote(idx, amount) {
            candidates[idx].votes += amount;
            const el = document.getElementById(`v-${idx}`);
            el.innerText = candidates[idx].votes;
            el.classList.add('animate__animated', 'animate__headShake');
            setTimeout(() => el.classList.remove('animate__animated', 'animate__headShake'), 500);
        }

        function startVoting() {
            if(!confirm("투표를 시작할까요?")) return;
            isVoting = true;
            document.getElementById('status-badge').innerText = "투표 중";
            document.getElementById('status-badge').className = "px-3 py-1 rounded-full bg-green-500 text-white text-xs font-bold uppercase tracking-wider shadow-sm";
            document.getElementById('start-btn').style.display = 'none';
            document.getElementById('end-btn').style.display = 'block';
            document.getElementById('config-bar').classList.add('opacity-40', 'pointer-events-none');
            renderBoard();
        }

        function endVoting() {
            if(!confirm("투표를 마감할까요?")) return;
            isVoting = false;
            document.getElementById('status-badge').innerText = "개표 완료";
            document.getElementById('status-badge').className = "px-3 py-1 rounded-full bg-red-600 text-white text-xs font-bold uppercase tracking-wider shadow-sm";
            document.getElementById('end-btn').style.display = 'none';
            document.getElementById('submit-btn').style.display = 'block';
            renderBoard();
        }

        function submitResults() {
            const url = document.getElementById('ss-url').value.trim();
            const g = document.getElementById('grade').value;
            const c = document.getElementById('classNum').value;
            showModal("전송 중", "데이터를 시트에 기록하고 있습니다...");
            google.script.run
                .withSuccessHandler(() => { alert("저장 성공! 선거가 종료되었습니다."); location.reload(); })
                .withFailureHandler((err) => { showModal("저장 실패", err.message, false, true); })
                .saveResults(url, g, c, candidates);
        }
    </script>
</body>
</html>
