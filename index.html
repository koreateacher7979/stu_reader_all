<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>전교학생회장 스마트 개표기</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* 커스텀 스크롤바 숨기기 (가상 시트 탭용) */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* 폭죽 및 당선자 카드 애니메이션 */
        @keyframes fall {
            to { transform: translateY(110vh) rotate(720deg); }
        }
        .animate-fall {
            animation-name: fall;
            animation-timing-function: linear;
            animation-iteration-count: infinite;
        }
        .winner-card {
            animation: popIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            opacity: 0;
            transform: scale(0.5);
        }
        @keyframes popIn {
            to { opacity: 1; transform: scale(1); }
        }
        .glow {
            box-shadow: 0 0 20px rgba(250, 204, 21, 0.5), inset 0 0 15px rgba(250, 204, 21, 0.3);
        }
        
        /* 토스트 애니메이션 */
        .toast-enter { animation: toastIn 0.3s ease-out forwards; }
        @keyframes toastIn {
            from { transform: translate(-50%, 100%); opacity: 0; }
            to { transform: translate(-50%, 0); opacity: 1; }
        }
    </style>
</head>
<body class="bg-gray-100 font-sans text-gray-900 pb-20 select-none">

    <!-- 헤더 내비게이션 -->
    <header class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center space-x-4">
                <div class="flex items-center space-x-2 text-blue-600">
                    <i class="fa-solid fa-check-to-slot text-2xl"></i>
                    <h1 class="text-xl font-extrabold tracking-tight hidden sm:block">전교학생회장 스마트 개표기</h1>
                </div>
                <span class="text-xs text-gray-400 font-medium hidden md:block border-l border-gray-200 pl-4 py-1">개발자 : 가치있는 미래교육 연구소 대표 김병찬</span>
            </div>
            
            <div class="flex items-center space-x-3">
                <nav class="flex space-x-1 bg-gray-100 p-1 rounded-lg">
                    <button onclick="switchTab('setup')" id="nav-setup" class="px-3 sm:px-4 py-1.5 rounded-md text-sm font-bold flex items-center transition-all bg-white text-blue-600 shadow-sm">
                        <i class="fa-solid fa-gear sm:mr-1.5"></i> <span class="hidden sm:inline">설정</span>
                    </button>
                    <button onclick="switchTab('voting')" id="nav-voting" class="px-3 sm:px-4 py-1.5 rounded-md text-sm font-bold flex items-center transition-all text-gray-500 hover:text-gray-800">
                        <i class="fa-solid fa-check-to-slot sm:mr-1.5"></i> <span class="hidden sm:inline">개표하기</span>
                    </button>
                    <button onclick="attemptSwitchToSheets()" id="nav-sheets" class="px-3 sm:px-4 py-1.5 rounded-md text-sm font-bold flex items-center transition-all text-gray-500 hover:text-gray-800">
                        <i id="nav-sheets-icon" class="fa-solid fa-lock sm:mr-1.5 text-gray-400"></i> <span class="hidden sm:inline">데이터 시트</span>
                    </button>
                </nav>

                <!-- 글로벌 관리자 버튼 -->
                <button onclick="toggleAdmin()" id="btn-global-admin" class="p-2 rounded-full transition-all border shadow-sm flex items-center justify-center w-10 h-10 bg-white text-gray-500 border-gray-200 hover:bg-gray-50 hover:text-gray-800" title="관리자 모드 접속">
                    <i id="icon-global-admin" class="fa-solid fa-lock text-lg"></i>
                </button>
            </div>
        </div>
    </header>

    <!-- 메인 컨텐츠 영역 -->
    <main class="px-4 relative">
        
        <!-- [1] 설정 탭 -->
        <div id="view-setup" class="max-w-2xl mx-auto mt-8 bg-white p-8 rounded-2xl shadow-sm border border-gray-100">
            <div class="flex flex-col items-center mb-8 text-center">
                <i class="fa-solid fa-database text-blue-500 text-5xl mb-4"></i>
                <h2 class="text-2xl font-bold text-gray-800">선거 데이터 설정</h2>
                <p class="text-gray-500 mt-2">구글 시트에서 후보자 데이터를 가져와 개표를 준비합니다.</p>
            </div>

            <div class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">구글 시트 공유 링크</label>
                    <input type="text" id="input-sheet-url" placeholder="https://docs.google.com/spreadsheets/d/..." class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition shadow-sm">
                    <p class="text-xs text-gray-500 mt-2">* 시트 이름은 반드시 <strong>"후보자현황"</strong>이어야 하며, 접근 권한이 <strong>'링크가 있는 모든 사용자'</strong>로 설정되어 있어야 합니다.</p>
                </div>
                <button onclick="fetchSheetData()" id="btn-fetch" class="w-full py-3 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-lg shadow-md transition flex justify-center items-center">
                    구글 시트 데이터 연동하기
                </button>
                <div class="relative py-4">
                    <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-gray-200"></div></div>
                    <div class="relative flex justify-center text-sm"><span class="px-4 bg-white text-gray-500">또는</span></div>
                </div>
                <button onclick="loadDemoData()" class="w-full py-3 bg-gray-100 hover:bg-gray-200 text-gray-800 font-bold rounded-lg transition">
                    데모 데이터로 체험하기
                </button>
            </div>
        </div>

        <!-- [2] 개표 탭 -->
        <div id="view-voting" class="max-w-5xl mx-auto mt-6 hidden">
            <!-- 데이터 없을 때 -->
            <div id="voting-empty" class="text-center py-20 hidden">
                <i class="fa-solid fa-users text-gray-300 text-6xl mb-4"></i>
                <h2 class="text-xl font-bold text-gray-600">후보자 데이터가 없습니다</h2>
                <p class="text-gray-500 mt-2 mb-6">설정 메뉴에서 먼저 데이터를 불러와주세요.</p>
                <button onclick="switchTab('setup')" class="px-6 py-2 bg-blue-600 text-white rounded-lg shadow">설정으로 이동</button>
            </div>

            <!-- 개표 설정 화면 (학년/반 선택) -->
            <div id="voting-setup" class="bg-white p-6 rounded-xl shadow-sm border border-gray-200 text-center mb-6 hidden">
                <h2 class="text-xl font-bold text-gray-800 mb-6">어느 학급의 개표를 진행하시겠습니까?</h2>
                <div class="flex justify-center items-center space-x-4 mb-8">
                    <select id="select-grade" class="px-4 py-3 rounded-lg border border-gray-300 text-lg font-bold focus:ring-2 focus:ring-blue-500">
                        <option value="1">1학년</option><option value="2">2학년</option><option value="3">3학년</option>
                        <option value="4">4학년</option><option value="5">5학년</option><option value="6">6학년</option>
                    </select>
                    <select id="select-class" class="px-4 py-3 rounded-lg border border-gray-300 text-lg font-bold focus:ring-2 focus:ring-blue-500">
                        <option value="1">1반</option><option value="2">2반</option><option value="3">3반</option><option value="4">4반</option><option value="5">5반</option><option value="6">6반</option>
                        <option value="7">7반</option><option value="8">8반</option><option value="9">9반</option><option value="10">10반</option><option value="11">11반</option><option value="12">12반</option>
                    </select>
                </div>
                <button onclick="startVoting()" class="px-10 py-3 bg-green-600 hover:bg-green-700 text-white text-lg font-bold rounded-full shadow-lg transition transform hover:scale-105">
                    개표 시작하기
                </button>
            </div>

            <!-- 꽉찬 화면 개표 진행 영역 -->
            <div id="voting-active" class="fixed inset-0 z-[100] bg-gray-200 flex flex-col p-2 md:p-4 h-screen w-screen overflow-hidden hidden">
                <div class="flex justify-between items-center bg-white p-3 md:p-4 rounded-xl shadow-md border border-gray-300 mb-3 shrink-0">
                    <div class="flex items-center space-x-3">
                        <span class="bg-blue-100 text-blue-800 px-3 py-1 rounded-full font-bold animate-pulse">개표 진행 중</span>
                        <h2 id="voting-active-title" class="text-xl md:text-2xl font-black text-gray-800"></h2>
                    </div>
                    <div class="space-x-3 flex">
                        <button onclick="cancelVoting()" class="px-4 py-2 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200 font-bold transition">취소</button>
                        <button onclick="submitVotes()" class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 font-bold flex items-center shadow-md transition">
                            <i class="fa-solid fa-floppy-disk mr-2"></i> 완료 및 전송
                        </button>
                    </div>
                </div>
                <div id="voting-grid" class="flex-1 min-h-0 grid gap-3 md:gap-4">
                    <!-- 동적 생성 됨 -->
                </div>
            </div>
        </div>

        <!-- [3] 가상 시트 뷰 탭 -->
        <div id="view-sheets" class="max-w-6xl mx-auto mt-6 bg-gray-50 rounded-xl shadow-md border border-gray-200 overflow-hidden flex-col hidden" style="min-height: 600px;">
            <div class="bg-white border-b border-gray-300 px-4 py-2 flex items-center justify-between text-sm text-gray-600">
                <div class="flex items-center space-x-4">
                    <span class="font-bold text-gray-800">개표결과 스프레드시트</span>
                    <span class="bg-green-100 text-green-800 px-2 py-0.5 rounded text-xs font-bold">자동 저장됨</span>
                </div>
            </div>
            
            <!-- 메인 테이블 뷰 영역 -->
            <div class="p-6 flex-grow bg-white overflow-y-auto" id="sheet-content">
                <!-- 동적 생성 됨 -->
            </div>

            <!-- 시트 하단 탭 영역 -->
            <div class="bg-gray-100 border-t border-gray-300 flex overflow-x-auto select-none no-scrollbar" id="sheet-tabs">
                <!-- 동적 생성 됨 -->
            </div>
        </div>
    </main>

    <!-- 모달 및 오버레이 -->
    <!-- 관리자 인증 모달 -->
    <div id="modal-admin" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-[300] p-4 backdrop-blur-sm hidden">
        <div class="bg-white p-8 rounded-2xl shadow-2xl max-w-sm w-full text-center relative">
            <button onclick="closeAdminModal()" class="absolute top-4 right-4 p-2 text-gray-400 hover:text-gray-600 font-bold">✕</button>
            <div class="flex justify-center mb-6 mt-2">
                <div class="bg-gray-100 p-4 rounded-full text-gray-700 shadow-inner">
                    <i class="fa-solid fa-lock text-4xl"></i>
                </div>
            </div>
            <h2 class="text-2xl font-bold text-gray-800 mb-2">관리자 인증</h2>
            <p class="text-gray-500 mb-6 text-sm">해당 기능은 관리자 권한이 필요합니다.</p>
            
            <form onsubmit="handleAdminLogin(event)" class="space-y-4">
                <input type="password" id="input-admin-pw" placeholder="비밀번호를 입력하세요" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition text-center text-lg tracking-widest" autocomplete="off">
                <button type="submit" id="btn-admin-submit" class="w-full py-3 bg-gray-800 hover:bg-gray-900 text-white font-bold rounded-lg shadow-md transition disabled:bg-gray-400">인증하기</button>
            </form>
        </div>
    </div>

    <!-- 확인 모달 -->
    <div id="modal-confirm" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4 hidden">
        <div class="bg-white rounded-xl shadow-2xl max-w-sm w-full p-6">
            <h3 id="confirm-title" class="text-xl font-bold mb-2 text-gray-900">알림</h3>
            <p id="confirm-msg" class="text-gray-600 mb-6"></p>
            <div class="flex justify-end space-x-3">
                <button onclick="closeConfirmModal()" class="px-4 py-2 text-gray-600 bg-gray-100 rounded-lg hover:bg-gray-200 transition">취소</button>
                <button id="btn-confirm-action" class="px-4 py-2 rounded-lg transition bg-blue-600 hover:bg-blue-700 text-white">확인</button>
            </div>
        </div>
    </div>

    <!-- 토스트 메시지 -->
    <div id="toast-container" class="fixed bottom-4 left-1/2 transform -translate-x-1/2 z-[400] flex flex-col gap-2 pointer-events-none"></div>

    <!-- 당선자 발표 애니메이션 모달 -->
    <div id="modal-winners" class="fixed inset-0 z-[200] bg-gray-900 text-white overflow-hidden flex-col items-center justify-center p-4 md:p-8 hidden">
        <div id="confetti-container" class="absolute inset-0 pointer-events-none"></div>
        <div class="relative z-10 flex flex-col items-center w-full max-w-6xl h-full overflow-y-auto">
            <div class="flex items-center space-x-4 mb-8 md:mb-12 mt-10 shrink-0">
                <i class="fa-solid fa-trophy text-5xl text-yellow-400 animate-bounce"></i>
                <h1 class="text-4xl md:text-6xl font-black text-transparent bg-clip-text bg-gradient-to-r from-yellow-300 via-yellow-100 to-yellow-500 drop-shadow-[0_5px_5px_rgba(0,0,0,0.8)]">최종 당선자 발표</h1>
                <i class="fa-solid fa-trophy text-5xl text-yellow-400 animate-bounce" style="animation-delay: 0.2s;"></i>
            </div>
            <div id="winners-grid" class="flex flex-wrap justify-center gap-6 md:gap-8 w-full pb-20">
                <!-- 동적 생성 -->
            </div>
            <button onclick="closeWinners()" class="fixed bottom-10 px-10 py-4 bg-white text-gray-900 rounded-full font-black text-lg hover:bg-gray-200 transition-all hover:scale-105 shadow-[0_0_20px_rgba(255,255,255,0.4)] z-50">
                결과 화면으로 돌아가기
            </button>
        </div>
    </div>

    <!-- 바닐라 자바스크립트 로직 -->
    <script>
        // === 글로벌 상태 (State) ===
        const state = {
            activeTab: 'setup', // 'setup', 'voting', 'sheets'
            candidates: [],
            classResults: {},
            isVoting: false,
            grade: '1',
            classNum: '1',
            currentVotes: {},
            currentSheetTab: 'candidates', // 'candidates', 'total', '0101' 등
            sheetUrl: '',
            isAdminAuthenticated: false,
            pendingAction: null,
            confirmAction: null
        };

        // === 유틸리티: 토스트 알림 ===
        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            
            const isError = type === 'error';
            const isSuccess = type === 'success';
            
            toast.className = `px-6 py-3 rounded-full shadow-lg text-white font-medium flex items-center space-x-2 transition-all toast-enter ${isError ? 'bg-red-600' : isSuccess ? 'bg-green-600' : 'bg-gray-800'}`;
            
            const icon = document.createElement('i');
            icon.className = isError ? 'fa-solid fa-circle-exclamation' : 'fa-solid fa-circle-check';
            
            const text = document.createElement('span');
            text.textContent = message;
            
            toast.appendChild(icon);
            toast.appendChild(text);
            container.appendChild(toast);
            
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // === UI 렌더링 및 탭 스위칭 ===
        function updateNavUI() {
            const tabs = ['setup', 'voting', 'sheets'];
            tabs.forEach(t => {
                const btn = document.getElementById(`nav-${t}`);
                if(t === state.activeTab) {
                    btn.className = "px-3 sm:px-4 py-1.5 rounded-md text-sm font-bold flex items-center transition-all bg-white text-blue-600 shadow-sm";
                } else {
                    btn.className = "px-3 sm:px-4 py-1.5 rounded-md text-sm font-bold flex items-center transition-all text-gray-500 hover:text-gray-800";
                }
            });

            // 데이터 시트 탭 아이콘 변경
            const sheetIcon = document.getElementById('nav-sheets-icon');
            if(state.isAdminAuthenticated) {
                sheetIcon.className = "fa-solid fa-table sm:mr-1.5 text-blue-600";
            } else {
                sheetIcon.className = "fa-solid fa-lock sm:mr-1.5 text-gray-400";
            }

            // 글로벌 관리자 버튼 UI
            const adminBtn = document.getElementById('btn-global-admin');
            const adminIcon = document.getElementById('icon-global-admin');
            if(state.isAdminAuthenticated) {
                adminBtn.className = "p-2 rounded-full transition-all border shadow-sm flex items-center justify-center w-10 h-10 bg-blue-100 text-blue-700 border-blue-200 hover:bg-blue-200";
                adminIcon.className = "fa-solid fa-lock-open text-lg";
                adminBtn.title = "관리자 로그아웃";
            } else {
                adminBtn.className = "p-2 rounded-full transition-all border shadow-sm flex items-center justify-center w-10 h-10 bg-white text-gray-500 border-gray-200 hover:bg-gray-50 hover:text-gray-800";
                adminIcon.className = "fa-solid fa-lock text-lg";
                adminBtn.title = "관리자 모드 접속";
            }

            document.getElementById('view-setup').classList.add('hidden');
            document.getElementById('view-voting').classList.add('hidden');
            document.getElementById('view-sheets').classList.add('hidden');
            document.getElementById('view-sheets').classList.remove('flex');

            if(state.activeTab === 'setup') document.getElementById('view-setup').classList.remove('hidden');
            if(state.activeTab === 'voting') {
                document.getElementById('view-voting').classList.remove('hidden');
                renderVotingTab();
            }
            if(state.activeTab === 'sheets') {
                document.getElementById('view-sheets').classList.remove('hidden');
                document.getElementById('view-sheets').classList.add('flex');
                renderSheetViewTab();
            }
        }

        function switchTab(tab) {
            state.activeTab = tab;
            updateNavUI();
        }

        function attemptSwitchToSheets() {
            if (state.isAdminAuthenticated) {
                switchTab('sheets');
            } else {
                state.pendingAction = 'go_to_sheets';
                openAdminModal();
            }
        }

        function toggleAdmin() {
            if (state.isAdminAuthenticated) {
                state.isAdminAuthenticated = false;
                if (state.activeTab === 'sheets') switchTab('voting');
                showToast('관리자 모드가 해제되었습니다.', 'info');
                updateNavUI();
            } else {
                openAdminModal();
            }
        }

        // === 구글 시트 연동 로직 ===
        async function fetchSheetData() {
            const urlInput = document.getElementById('input-sheet-url').value;
            state.sheetUrl = urlInput;
            
            if (!urlInput.trim()) {
                showToast('구글 시트 URL을 입력해주세요.', 'error');
                return;
            }
            
            const btn = document.getElementById('btn-fetch');
            btn.disabled = true;
            btn.innerText = '데이터 불러오는 중...';

            try {
                const match = urlInput.match(/\/d\/(.*?)\//);
                if (!match) throw new Error("올바른 구글 시트 URL 형식이 아닙니다.");
                const id = match[1];
                
                const sheetName = encodeURIComponent('후보자현황');
                const fetchUrl = `https://docs.google.com/spreadsheets/d/${id}/gviz/tq?tqx=out:json&sheet=${sheetName}`;
                
                const res = await fetch(fetchUrl);
                if (!res.ok) throw new Error("데이터 접근 실패. '링크가 있는 모든 사용자' 공개인지 확인하세요.");
                
                const text = await res.text();
                const jsonString = text.substring(text.indexOf('{'), text.lastIndexOf('}') + 1);
                const json = JSON.parse(jsonString);
                
                const rows = json.table.rows;
                const parsedData = rows.map((row, idx) => {
                    const field = row.c[0]?.v?.toString() || '';
                    const number = row.c[1]?.v?.toString() || '';
                    const name = row.c[2]?.v?.toString() || '';
                    const gender = row.c[3]?.v?.toString() || '';
                    const pledge = row.c[4]?.v?.toString() || '';
                    
                    if (!name) return null;
                    return { id: `${field}_${number}_${idx}`, field, number, name, gender, pledge };
                }).filter(Boolean);
                
                if (parsedData.length === 0) throw new Error("시트에 유효한 데이터가 없습니다.");
                
                state.candidates = parsedData;
                showToast(`${parsedData.length}명의 후보자 데이터를 불러왔습니다.`, 'success');
                switchTab('voting');
            } catch (e) {
                showToast(e.message, 'error');
            } finally {
                btn.disabled = false;
                btn.innerText = '구글 시트 데이터 연동하기';
            }
        }

        function loadDemoData() {
            state.sheetUrl = ''; // 데모 모드
            state.candidates = [
                { id: 'c1', field: '전교회장', number: '1', name: '김철수', gender: '남', pledge: '깨끗한 화장실 만들기' },
                { id: 'c2', field: '전교회장', number: '2', name: '이영희', gender: '여', pledge: '맛있는 급식, 매점 부활' },
                { id: 'c3', field: '전교회장', number: '3', name: '박지민', gender: '여', pledge: '체육대회 종목 확대' },
                { id: 'c4', field: '6학년부회장', number: '1', name: '최동원', gender: '남', pledge: '쉬는 시간 5분 연장' },
                { id: 'c5', field: '6학년부회장', number: '2', name: '정수정', gender: '여', pledge: '학생 휴게공간 확충' },
                { id: 'c6', field: '5학년부회장', number: '1', name: '강호동', gender: '남', pledge: '운동장 인조잔디 건의' }
            ];
            showToast('데모 데이터를 불러왔습니다.', 'success');
            switchTab('voting');
        }

        // === 데이터 가공 함수 ===
        function getGroupedCandidates() {
            return state.candidates.reduce((acc, curr) => {
                if (!acc[curr.field]) acc[curr.field] = [];
                acc[curr.field].push(curr);
                return acc;
            }, {});
        }

        function getTotalVotes() {
            const totals = {};
            Object.values(state.classResults).forEach(cls => {
                Object.entries(cls.votes).forEach(([candId, count]) => {
                    totals[candId] = (totals[candId] || 0) + count;
                });
            });
            return totals;
        }

        // === 개표 탭 로직 ===
        function renderVotingTab() {
            const emptyView = document.getElementById('voting-empty');
            const setupView = document.getElementById('voting-setup');
            const activeView = document.getElementById('voting-active');

            emptyView.classList.add('hidden');
            setupView.classList.add('hidden');
            activeView.classList.add('hidden');

            if (state.candidates.length === 0) {
                emptyView.classList.remove('hidden');
            } else if (!state.isVoting) {
                setupView.classList.remove('hidden');
            } else {
                activeView.classList.remove('hidden');
                document.getElementById('voting-active-title').textContent = `${state.grade}학년 ${state.classNum}반`;
                renderVotingGrid();
            }
        }

        function startVoting() {
            state.grade = document.getElementById('select-grade').value;
            state.classNum = document.getElementById('select-class').value;
            state.currentVotes = {};
            state.isVoting = true;
            renderVotingTab();
        }

        function cancelVoting() {
            state.isVoting = false;
            renderVotingTab();
        }

        function handleVote(candidateId, change) {
            const current = state.currentVotes[candidateId] || 0;
            const next = current + change;
            state.currentVotes[candidateId] = next < 0 ? 0 : next;
            document.getElementById(`vote-count-${candidateId}`).textContent = state.currentVotes[candidateId];
        }

        function renderVotingGrid() {
            const container = document.getElementById('voting-grid');
            container.innerHTML = '';
            const grouped = getGroupedCandidates();
            const keys = Object.keys(grouped);
            
            container.style.gridTemplateColumns = `repeat(${keys.length}, minmax(0, 1fr))`;

            keys.forEach(field => {
                const cands = grouped[field];
                
                const colDiv = document.createElement('div');
                colDiv.className = "bg-white rounded-2xl shadow-lg border border-gray-300 p-3 flex flex-col h-full min-h-0";
                
                colDiv.innerHTML = `<h3 class="text-xl md:text-2xl font-black text-center text-gray-800 pb-2 mb-3 border-b-4 border-gray-800 shrink-0">${field}</h3>`;
                
                const gridDiv = document.createElement('div');
                gridDiv.className = "flex-1 min-h-0 grid gap-3";
                gridDiv.style.gridTemplateRows = `repeat(${cands.length}, minmax(0, 1fr))`;

                cands.forEach(cand => {
                    const count = state.currentVotes[cand.id] || 0;
                    const card = document.createElement('div');
                    card.className = "bg-gray-50 rounded-xl border border-gray-300 flex flex-col h-full overflow-hidden shadow-sm";
                    card.innerHTML = `
                        <div class="bg-blue-50 px-3 py-2 border-b border-gray-200 flex justify-between items-center shrink-0">
                            <span class="text-sm font-bold text-blue-600 bg-white px-2 py-0.5 rounded border border-blue-100">기호 ${cand.number}번</span>
                            <div class="text-lg md:text-xl font-black text-gray-900">${cand.name} <span class="text-sm font-medium text-gray-500">(${cand.gender})</span></div>
                        </div>
                        <div class="flex-1 flex items-center justify-between p-3 min-h-0">
                            <button onclick="handleVote('${cand.id}', -1)" class="w-16 h-full max-h-24 bg-white text-red-500 rounded-xl border-2 border-gray-200 hover:bg-red-50 hover:border-red-300 flex items-center justify-center transition-all active:scale-95 shadow-sm shrink-0">
                                <i class="fa-solid fa-minus text-3xl"></i>
                            </button>
                            <div id="vote-count-${cand.id}" class="text-6xl md:text-8xl font-black text-gray-900 tabular-nums text-center flex-1 min-w-0 overflow-hidden tracking-tighter">
                                ${count}
                            </div>
                            <button onclick="handleVote('${cand.id}', 1)" class="w-16 h-full max-h-24 bg-blue-600 text-white rounded-xl shadow-lg hover:bg-blue-700 flex items-center justify-center transition-all active:scale-95 shrink-0">
                                <i class="fa-solid fa-plus text-3xl"></i>
                            </button>
                        </div>
                    `;
                    gridDiv.appendChild(card);
                });
                
                colDiv.appendChild(gridDiv);
                container.appendChild(colDiv);
            });
        }

        function submitVotes() {
            const classId = `${state.grade.padStart(2, '0')}${state.classNum.padStart(2, '0')}`;
            const className = `${state.grade}학년 ${state.classNum}반`;

            const save = () => {
                state.classResults[classId] = {
                    className,
                    votes: { ...state.currentVotes },
                    timestamp: Date.now()
                };
                showToast(`[${className}] 개표 결과가 전송되었습니다.`, 'success');
                state.isVoting = false;
                closeConfirmModal();
                renderVotingTab(); // 대기 화면으로
            };

            if (state.classResults[classId]) {
                openConfirmModal(
                    '데이터 덮어쓰기', 
                    `이미 ${className}의 개표 결과가 존재합니다. 기존 데이터를 덮어쓰시겠습니까?`, 
                    save, 
                    'bg-blue-600 hover:bg-blue-700'
                );
            } else {
                save();
            }
        }

        // === 데이터 시트 뷰 로직 ===
        function renderSheetViewTab() {
            const tabsContainer = document.getElementById('sheet-tabs');
            const contentContainer = document.getElementById('sheet-content');
            tabsContainer.innerHTML = '';
            contentContainer.innerHTML = '';

            const sortedClasses = Object.keys(state.classResults).sort();

            // 탭 버튼 생성
            const createTabBtn = (id, label, iconHtml = '') => {
                const isSelected = state.currentSheetTab === id;
                const btn = document.createElement('button');
                btn.onclick = () => { state.currentSheetTab = id; renderSheetViewTab(); };
                btn.className = `px-6 py-2.5 text-sm font-medium whitespace-nowrap border-r border-gray-300 transition-colors flex items-center ${isSelected ? 'bg-white text-blue-600 border-t-2 border-t-blue-600 shadow-sm' : 'text-gray-600 hover:bg-gray-200'}`;
                if(id === 'total') btn.className = `px-6 py-2.5 text-sm font-black whitespace-nowrap border-r border-gray-300 transition-colors flex items-center ${isSelected ? 'bg-white text-blue-600 border-t-2 border-t-blue-600 shadow-sm' : 'text-gray-800 hover:bg-gray-200 bg-gray-50'}`;
                btn.innerHTML = `${iconHtml}${label}`;
                return btn;
            };

            tabsContainer.appendChild(createTabBtn('candidates', '후보자현황'));
            sortedClasses.forEach(cls => tabsContainer.appendChild(createTabBtn(cls, cls)));
            tabsContainer.appendChild(createTabBtn('total', '전체합계', '<i class="fa-solid fa-chart-column mr-1"></i> '));

            // 테이블 생성 헬퍼
            const createTable = (headers, rows) => {
                let html = `<div class="overflow-x-auto bg-white border border-gray-300 shadow-sm"><table class="min-w-full text-sm text-left whitespace-nowrap"><thead class="bg-gray-100 border-b border-gray-300 sticky top-0"><tr>`;
                headers.forEach(h => html += `<th class="px-4 py-3 font-semibold text-gray-700 border-r border-gray-300 last:border-r-0">${h}</th>`);
                html += `</tr></thead><tbody>`;
                
                if(rows.length === 0) {
                    html += `<tr><td colspan="${headers.length}" class="px-4 py-8 text-center text-gray-500">데이터가 없습니다.</td></tr>`;
                } else {
                    rows.forEach(row => {
                        html += `<tr class="border-b border-gray-200 hover:bg-blue-50 transition">`;
                        row.forEach(cell => html += `<td class="px-4 py-3 border-r border-gray-200 last:border-r-0 text-gray-800">${cell}</td>`);
                        html += `</tr>`;
                    });
                }
                html += `</tbody></table></div>`;
                return html;
            };

            // 컨텐츠 렌더링
            if (state.currentSheetTab === 'candidates') {
                const headers = ['출마분야', '기호', '출마후보명', '성별', '공약'];
                const rows = state.candidates.map(c => [c.field, c.number, c.name, c.gender, c.pledge]);
                contentContainer.innerHTML = `<div class="mb-4 text-lg font-bold text-gray-800 flex items-center"><i class="fa-solid fa-users mr-2 text-blue-600"></i> 후보자 현황 데이터</div>` + createTable(headers, rows);
            } 
            else if (state.currentSheetTab === 'total') {
                const totals = getTotalVotes();
                const headers = ['출마분야', '기호', '출마후보명', '총 득표수'];
                const rows = state.candidates.map(c => [
                    c.field, c.number, `<strong>${c.name}</strong>`, `<span class="text-lg font-bold text-blue-600">${totals[c.id] || 0}</span>`
                ]);
                
                contentContainer.innerHTML = `
                    <div class="mb-4 flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4">
                        <div class="text-lg font-bold text-gray-800 flex items-center">
                            <i class="fa-solid fa-chart-column mr-2 text-blue-600"></i> 전체 합계 현황
                            <span class="ml-3 text-sm font-normal text-gray-500 bg-gray-100 px-2 py-1 rounded">집계: ${Object.keys(state.classResults).length}학급</span>
                        </div>
                        <button onclick="openWinners()" class="flex items-center px-5 py-2.5 bg-gradient-to-r from-yellow-400 to-yellow-500 hover:from-yellow-500 hover:to-yellow-600 text-white font-black rounded-lg shadow-md transition-all transform hover:scale-105">
                            <i class="fa-solid fa-trophy mr-2"></i> 당선자 발표 시작하기
                        </button>
                    </div>
                ` + createTable(headers, rows);
            } 
            else {
                const classData = state.classResults[state.currentSheetTab];
                if (!classData) {
                    contentContainer.innerHTML = `<div>데이터 오류: 학급을 찾을 수 없습니다.</div>`;
                } else {
                    const headers = ['출마분야', '기호', '출마후보명', '해당 학급 득표수'];
                    const rows = state.candidates.map(c => [
                        c.field, c.number, c.name, `<span class="font-bold">${classData.votes[c.id] || 0}</span>`
                    ]);
                    
                    contentContainer.innerHTML = `
                        <div class="mb-4 flex justify-between items-center">
                            <div class="text-lg font-bold text-gray-800 flex items-center">
                                <i class="fa-solid fa-table mr-2 text-blue-600"></i> ${classData.className} 개표 결과 (시트명: ${state.currentSheetTab})
                            </div>
                            <button onclick="requestDeleteClass('${state.currentSheetTab}')" class="flex items-center text-sm px-3 py-1.5 bg-red-50 text-red-600 border border-red-200 rounded hover:bg-red-100 transition">
                                <i class="fa-solid fa-trash-can mr-1"></i> 이 학급 데이터 삭제
                            </button>
                        </div>
                    ` + createTable(headers, rows);
                }
            }
        }

        function requestDeleteClass(classId) {
            openConfirmModal(
                '학급 데이터 삭제',
                `정말 [${classId}] 학급의 개표 결과를 삭제하시겠습니까? 전체 합계에서 제외됩니다.`,
                () => {
                    delete state.classResults[classId];
                    state.currentSheetTab = 'total';
                    showToast(`${classId} 학급 데이터가 삭제되었습니다.`, 'info');
                    closeConfirmModal();
                    renderSheetViewTab();
                },
                'bg-red-600 hover:bg-red-700'
            );
        }

        // === 관리자 모달 및 로직 ===
        function openAdminModal() {
            document.getElementById('input-admin-pw').value = '';
            document.getElementById('modal-admin').classList.remove('hidden');
            setTimeout(() => document.getElementById('input-admin-pw').focus(), 100);
        }

        function closeAdminModal() {
            document.getElementById('modal-admin').classList.add('hidden');
            state.pendingAction = null;
        }

        async function handleAdminLogin(e) {
            e.preventDefault();
            const pwInput = document.getElementById('input-admin-pw').value;
            if (!pwInput.trim()) {
                showToast('비밀번호를 입력해주세요.', 'error');
                return;
            }

            const onSuccess = () => {
                state.isAdminAuthenticated = true;
                closeAdminModal();
                if (state.pendingAction === 'go_to_sheets') {
                    state.currentSheetTab = 'candidates';
                    switchTab('sheets');
                } else {
                    updateNavUI();
                }
            };

            if (!state.sheetUrl) {
                if (pwInput === '1234') {
                    onSuccess();
                    showToast('관리자 인증 완료 (데모)', 'success');
                } else {
                    showToast('비밀번호가 일치하지 않습니다. (시트 연동 전 데모 비번: 1234)', 'error');
                }
                return;
            }

            const btn = document.getElementById('btn-admin-submit');
            btn.disabled = true;
            btn.textContent = '확인 중...';

            try {
                const match = state.sheetUrl.match(/\/d\/(.*?)\//);
                if (!match) throw new Error("올바른 구글 시트 URL 형식이 아닙니다.");
                const id = match[1];

                const sheetName = encodeURIComponent('관리자');
                const fetchUrl = `https://docs.google.com/spreadsheets/d/${id}/gviz/tq?tqx=out:json&sheet=${sheetName}&range=A2`;

                const res = await fetch(fetchUrl);
                if (!res.ok) throw new Error("관리자 시트에 접근할 수 없습니다.");

                const text = await res.text();
                const jsonString = text.substring(text.indexOf('{'), text.lastIndexOf('}') + 1);
                const json = JSON.parse(jsonString);

                if (json.status === 'error') {
                    throw new Error(`시트 오류: ${json.errors[0]?.message || '관리자 시트를 찾을 수 없습니다.'}`);
                }

                let actualPassword = '';
                if (json.table.rows && json.table.rows.length > 0 && json.table.rows[0].c && json.table.rows[0].c[0]) {
                    actualPassword = json.table.rows[0].c[0].v;
                } else if (json.table.cols && json.table.cols.length > 0) {
                    actualPassword = json.table.cols[0].label;
                }
                actualPassword = actualPassword?.toString() || '';

                if (actualPassword.trim() === pwInput.trim()) {
                    onSuccess();
                    showToast('관리자 인증이 완료되었습니다.', 'success');
                } else {
                    showToast('비밀번호가 일치하지 않습니다.', 'error');
                }
            } catch (e) {
                showToast(e.message, 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = '인증하기';
            }
        }

        // === 확인 모달 ===
        function openConfirmModal(title, message, onConfirm, confirmBtnClass) {
            document.getElementById('confirm-title').textContent = title;
            document.getElementById('confirm-msg').textContent = message;
            
            const btn = document.getElementById('btn-confirm-action');
            btn.className = `px-4 py-2 rounded-lg transition text-white ${confirmBtnClass}`;
            
            // 이벤트 리스너 중복 방지를 위해 클론하여 재생성
            const newBtn = btn.cloneNode(true);
            newBtn.addEventListener('click', onConfirm);
            btn.parentNode.replaceChild(newBtn, btn);

            document.getElementById('modal-confirm').classList.remove('hidden');
        }

        function closeConfirmModal() {
            document.getElementById('modal-confirm').classList.add('hidden');
        }

        // === 당선자 발표 애니메이션 ===
        function openWinners() {
            const container = document.getElementById('modal-winners');
            const grid = document.getElementById('winners-grid');
            const confettiContainer = document.getElementById('confetti-container');
            
            grid.innerHTML = '';
            confettiContainer.innerHTML = '';
            
            // 폭죽 생성
            const colors = ['#facc15', '#ef4444', '#3b82f6', '#22c55e', '#a855f7', '#ffffff'];
            for(let i=0; i<60; i++) {
                const c = document.createElement('div');
                c.className = 'absolute animate-fall';
                c.style.left = `${Math.random() * 100}vw`;
                c.style.top = `-10vh`;
                c.style.animationDelay = `${Math.random() * 5}s`;
                c.style.animationDuration = `${2 + Math.random() * 4}s`;
                c.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                c.style.width = `${8 + Math.random() * 12}px`;
                c.style.height = `${8 + Math.random() * 12}px`;
                c.style.borderRadius = Math.random() > 0.5 ? '50%' : '0%';
                c.style.transform = `rotate(${Math.random() * 360}deg)`;
                confettiContainer.appendChild(c);
            }

            // 결과 계산
            const grouped = getGroupedCandidates();
            const totals = getTotalVotes();
            
            let idx = 0;
            Object.entries(grouped).forEach(([field, cands]) => {
                let maxVotes = -1;
                let winners = [];
                cands.forEach(cand => {
                    const v = totals[cand.id] || 0;
                    if(v > maxVotes) { maxVotes = v; winners = [cand]; }
                    else if (v === maxVotes) { winners.push(cand); }
                });

                let cardsHtml = '';
                if(maxVotes === 0) {
                    cardsHtml = `<div class="text-gray-400 font-bold py-10">아직 득표 내역이 없습니다.</div>`;
                } else {
                    winners.forEach(w => {
                        cardsHtml += `
                            <div class="mb-6 last:mb-0 bg-gray-700/50 p-4 rounded-2xl">
                                <div class="inline-block px-3 py-1 bg-yellow-500/20 text-yellow-300 rounded-full text-sm font-bold mb-2">기호 ${w.number}번</div>
                                <div class="text-4xl md:text-5xl font-extrabold text-white mb-2 tracking-tight">${w.name}</div>
                                <div class="text-2xl text-yellow-400 font-black">총 ${maxVotes}표</div>
                            </div>
                        `;
                    });
                }

                const tieHtml = (winners.length > 1 && maxVotes > 0) ? `<div class="mt-4 px-4 py-2 bg-red-500/20 border border-red-500/50 rounded-lg text-red-400 font-bold animate-pulse">동점자 발생!</div>` : '';

                const cardDiv = document.createElement('div');
                cardDiv.className = "winner-card glow bg-gray-800 border-4 border-yellow-500 rounded-3xl p-6 md:p-8 flex-1 min-w-[280px] max-w-[400px] text-center relative overflow-hidden";
                cardDiv.style.animationDelay = `${idx * 0.4}s`;
                cardDiv.innerHTML = `
                    <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-yellow-400 to-yellow-600"></div>
                    <h2 class="text-2xl md:text-3xl font-black text-yellow-400 mb-6 drop-shadow-md">${field}</h2>
                    ${cardsHtml}
                    ${tieHtml}
                `;
                grid.appendChild(cardDiv);
                idx++;
            });

            container.classList.remove('hidden');
            container.classList.add('flex');
        }

        function closeWinners() {
            document.getElementById('modal-winners').classList.add('hidden');
            document.getElementById('modal-winners').classList.remove('flex');
        }

        // === 초기화 ===
        updateNavUI();

    </script>
</body>
